<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard · AppStatServer</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">AppStatServer</div>
    <nav class="nav" id="nav">
      <a href="#/overview" data-route="overview">Overview</a>
      <a href="#/analytics" data-route="analytics">Analytics</a>
      <a href="#/events" data-route="events">Events</a>
      <a href="#/logs" data-route="logs">Logs</a>
      <a href="#/crashes" data-route="crashes">Crashes</a>
    </nav>
    <div class="spacer"></div>
    <div class="user" id="user"></div>
    <button id="refresh">Refresh</button>
    <button id="logout">Sign out</button>
  </header>

  <main class="container" id="view"></main>

  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal" role="dialog" aria-modal="true">
      <header>
        <h3 id="modal-title">Event</h3>
        <button id="modal-close">Close</button>
      </header>
      <div class="body" id="modal-body"></div>
    </div>
  </div>

  <script src="/charts.js"></script>
  <script src="/app.js"></script>
</body>
</html>
